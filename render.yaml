services:
  - type: web
    name: deepscan-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: MODEL_PATH
        value: /app/models/model_finetuned_keras
      - key: REPORTS_DIR
        value: /app/reports
      - key: USE_GRADCAM
        value: "true"
      - key: USE_BLIP
        value: "false"
      - key: PRELOAD_MODEL
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RATE_LIMIT
        value: 30/minute
